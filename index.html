<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hunger Dash</title>
    <script type="module" crossorigin src="./assets/index-CQTFnCw0.js"></script>
  </head>
  <body>
    <div id="app">
      <div
        id="mobile-controls"
        style="
          position: absolute;
          bottom: 20px;
          left: 20px;
          width: 120px;
          height: 120px;
          touch-action: none;
          display: none;
          /* display controlled via JS */
        "
      >
        <div id="joystick-container" style="
              position: relative;
              width: 100%;
              height: 100%;
              background: rgba(255,255,255,0.2);
              border: 2px solid rgba(255,255,255,0.5);
              border-radius: 50%;
            ">
          <div id="joystick-thumb" style="
                position: absolute;
                width: 40%;
                height: 40%;
                background: rgba(255,255,255,0.5);
                border-radius: 50%;
                top: 30%;
                left: 30%;
                transition: top 0.1s, left 0.1s;
              "></div>
        </div>
      </div>
    </div>
<!-- <button id="toggleView" style="position:absolute;top:20px;right:20px;">Toggle View</button> -->

  </body>
</html>
